# --- Teksty i nagłówki ---
hero:
  subtitle: "Witamy w Pierogarni"
  title_line1: "Domowa tradycja"
  title_line2: "lepiona ręcznie."
  bg_image: "https://iili.io/BZtxBDu.md.jpg"

story:
  subtitle: "Nasza Historia"
  title: "Więcej niż kulinaria.\nTo nasze życie."
  paragraph1: "„Dla nas każda lepiona sztuka to osobna historia. Nie uznajemy skrótów, dlatego składniki wybieramy tak, jakbyśmy robili je dla własnej rodziny.”"
  paragraph2: "Kaszczorek to miejsce, gdzie czas płynie wolniej. Nasza pierogarnia oddaje ten klimat – jest swojsko, smacznie i zawsze z uśmiechem."
  main_image: "https://iili.io/BZt3K9j.md.jpg"
  sub_images:
    - "https://iili.io/BZt3BtV.md.jpg"
    - "https://iili.io/BZt39M7.md.jpg"

review:
  quote: "Najlepsze pierogi jakie jadłem w Toruniu! Czuć, że są robione z sercem i tradycją. Kaszczorek ma swój kulinarny skarb, do którego wracamy całą rodziną."

