# ==========================================
# KONFIGURACJA DECAP CMS (NETLIFY CMS)
# ==========================================

backend:
  name: git-gateway
  repo: pjawel/nakaszczorku
  branch: main
  identity_url: https://auth.decapbridge.com/sites/92bf7f64-262e-47b1-8c80-7c3c32dc8b8e
  gateway_url: https://gateway.decapbridge.com

media_folder: "public/uploads"
public_folder: "/uploads"

media_library:
  name: uploadcare
  config:
    publicKey: demopublickey

collections:
  - name: "settings"
    label: "Ustawienia strony"
    files:
      - file: "src/data/config.yml"
        label: "Wszystkie teksty na stronie"
        name: "site_config"
        fields:

          # ------------------------------------------
          - label: "Pasek nawigacji (Navbar)"
            name: "navbar"
            widget: "object"
            fields:
              - label: "Nazwa restauracji (logo, tekst obok)"
                name: "brand_name"
                widget: "string"
              - label: "Link Menu"
                name: "link_menu"
                widget: "string"
              - label: "Link Galeria"
                name: "link_gallery"
                widget: "string"
              - label: "Link Kontakt"
                name: "link_contact"
                widget: "string"
              - label: "Przycisk 'Zamów Online'"
                name: "order_button"
                widget: "string"
              - label: "Numer telefonu (przycisk)"
                name: "phone_display"
                widget: "string"

          # ------------------------------------------
          - label: "Sekcja Hero (Nagłówek)"
            name: "hero"
            widget: "object"
            fields:
              - label: "Nadtytuł"
                name: "eyebrow"
                widget: "string"
              - label: "Tytuł - linia 1"
                name: "title_line1"
                widget: "string"
              - label: "Tytuł - linia 2 (kursywa)"
                name: "title_line2"
                widget: "string"
              - label: "Przycisk 'Nasza Karta'"
                name: "cta_menu_label"
                widget: "string"
              - label: "Przycisk 'Złóż zamówienie'"
                name: "cta_order_label"
                widget: "string"
              - label: "Tekst 'Przewiń'"
                name: "scroll_label"
                widget: "string"

          # ------------------------------------------
          - label: "Sekcja Menu (Karta)"
            name: "menu_section"
            widget: "object"
            fields:
              - label: "Nadtytuł"
                name: "eyebrow"
                widget: "string"
              - label: "Tytuł"
                name: "title"
                widget: "string"
              - label: "Komunikat gdy brak stron menu"
                name: "empty_message"
                widget: "string"

          # ------------------------------------------
          - label: "Sekcja O Nas (Historia)"
            name: "story"
            widget: "object"
            fields:
              - label: "Nadtytuł"
                name: "eyebrow"
                widget: "string"
              - label: "Tytuł"
                name: "title"
                widget: "string"
              - label: "Akapit 1 (cytat)"
                name: "paragraph1"
                widget: "text"
              - label: "Akapit 2"
                name: "paragraph2"
                widget: "text"

          # ------------------------------------------
          - label: "Sekcja 'Zgłodniałeś?' (Wezwanie do zamówienia)"
            name: "cta_section"
            widget: "object"
            fields:
              - label: "Tytuł"
                name: "title"
                widget: "string"
              - label: "Opis"
                name: "description"
                widget: "text"
              - label: "Przycisk"
                name: "button_label"
                widget: "string"

          # ------------------------------------------
          - label: "Sekcja Galeria"
            name: "gallery_section"
            widget: "object"
            fields:
              - label: "Nadtytuł"
                name: "eyebrow"
                widget: "string"
              - label: "Tytuł"
                name: "title"
                widget: "string"
              - label: "Opis"
                name: "description"
                widget: "text"

          # ------------------------------------------
          - label: "Sekcja Opinie"
            name: "reviews"
            widget: "object"
            fields:
              - label: "Nadtytuł"
                name: "eyebrow"
                widget: "string"
              - label: "Tytuł"
                name: "title"
                widget: "string"
              - label: "Treść opinii"
                name: "quote"
                widget: "text"
              - label: "Przycisk 'Opinie na Facebooku'"
                name: "facebook_button_label"
                widget: "string"

          # ------------------------------------------
          - label: "Sekcja Kontakt"
            name: "contact"
            widget: "object"
            fields:
              - label: "Nadtytuł"
                name: "eyebrow"
                widget: "string"
              - label: "Tytuł"
                name: "title"
                widget: "string"
              - label: "Etykieta 'Lokalizacja'"
                name: "location_label"
                widget: "string"
              - label: "Adres - Ulica"
                name: "address_street"
                widget: "string"
              - label: "Adres - Miasto"
                name: "address_city"
                widget: "string"
              - label: "Etykieta 'Kontakt'"
                name: "contact_label"
                widget: "string"
              - label: "Telefon"
                name: "phone"
                widget: "string"
              - label: "Etykieta 'Godziny Gościnności'"
                name: "hours_label"
                widget: "string"
              - label: "Dni tygodnia (np. Pon - Nd)"
                name: "hours_days"
                widget: "string"
              - label: "Godziny otwarcia (np. 11:00 - 19:00)"
                name: "hours_time"
                widget: "string"
              - label: "Przycisk 'Obserwuj nas'"
                name: "facebook_follow_label"
                widget: "string"

          # ------------------------------------------
          - label: "Stopka (Footer)"
            name: "footer"
            widget: "object"
            fields:
              - label: "Nazwa restauracji"
                name: "brand_name"
                widget: "string"
              - label: "Cytat / opis"
                name: "tagline"
                widget: "text"
              - label: "Tytuł kolumny 'Nawigacja'"
                name: "nav_title"
                widget: "string"
              - label: "Link 'Karta Menu'"
                name: "nav_menu_label"
                widget: "string"
              - label: "Link 'Galeria Zdjęć'"
                name: "nav_gallery_label"
                widget: "string"
              - label: "Link 'Odwiedź Nas'"
                name: "nav_contact_label"
                widget: "string"
              - label: "Tytuł kolumny 'Kontakt'"
                name: "contact_title"
                widget: "string"
              - label: "Telefon"
                name: "phone"
                widget: "string"
              - label: "Adres"
                name: "address"
                widget: "string"
              - label: "Godziny otwarcia"
                name: "hours"
                widget: "string"
              - label: "Tekst praw autorskich (rok dodawany automatycznie)"
                name: "copyright_text"
                widget: "string"

          # ------------------------------------------
          - label: "Menu do Zamówień (kategorie i dania)"
            name: "order_menu"
            widget: "list"
            summary: "{{fields.category}}"
            fields:
              - label: "Nazwa kategorii"
                name: "category"
                widget: "string"
              - label: "Opis kategorii (opcjonalny)"
                name: "description"
                widget: "string"
                required: false
              - label: "Dania"
                name: "items"
                widget: "list"
                summary: "{{fields.name}} - {{fields.price}} zł"
                fields:
                  - label: "ID dania (unikalne, np. pierogi-ruskie)"
                    name: "id"
                    widget: "string"
                  - label: "Nazwa dania"
                    name: "name"
                    widget: "string"
                  - label: "Cena (zł)"
                    name: "price"
                    widget: "number"
                    value_type: "int"

          # ------------------------------------------
          - label: "Formularz zamówienia (etykiety)"
            name: "order_form"
            widget: "object"
            fields:
              - label: "Tytuł strony zamawiania"
                name: "page_title"
                widget: "string"
              - label: "Tytuł 'Dane do dostawy'"
                name: "delivery_title"
                widget: "string"
              - label: "Etykieta 'Twoje Imię'"
                name: "name_label"
                widget: "string"
              - label: "Placeholder imienia"
                name: "name_placeholder"
                widget: "string"
              - label: "Etykieta 'Numer Telefonu'"
                name: "phone_label"
                widget: "string"
              - label: "Placeholder telefonu"
                name: "phone_placeholder"
                widget: "string"
              - label: "Komunikat błędu telefonu"
                name: "phone_error"
                widget: "string"
              - label: "Etykieta 'Ulica'"
                name: "street_label"
                widget: "string"
              - label: "Placeholder ulicy"
                name: "street_placeholder"
                widget: "string"
              - label: "Etykieta 'Nr budynku'"
                name: "building_label"
                widget: "string"
              - label: "Placeholder nr budynku"
                name: "building_placeholder"
                widget: "string"
              - label: "Etykieta 'Nr lokalu'"
                name: "apartment_label"
                widget: "string"
              - label: "Placeholder nr lokalu"
                name: "apartment_placeholder"
                widget: "string"
              - label: "Etykieta 'Miasto'"
                name: "city_label"
                widget: "string"
              - label: "Placeholder miasta"
                name: "city_placeholder"
                widget: "string"
              - label: "Etykieta 'Uwagi'"
                name: "notes_label"
                widget: "string"
              - label: "Placeholder uwag"
                name: "notes_placeholder"
                widget: "string"
              - label: "Tytuł metody płatności"
                name: "payment_title"
                widget: "string"
              - label: "Opis metody płatności"
                name: "payment_description"
                widget: "text"
              - label: "Tytuł koszyka"
                name: "cart_title"
                widget: "string"
              - label: "Komunikat pustego koszyka"
                name: "cart_empty_message"
                widget: "string"
              - label: "Tytuł 'Dziękujemy!'"
                name: "thank_you_title"
                widget: "string"
              - label: "Opis podziękowania"
                name: "thank_you_description"
                widget: "text"
              - label: "Tytuł 'Szczegóły zamówienia'"
                name: "order_details_title"
                widget: "string"
              - label: "Przycisk 'Wróć do strony głównej'"
                name: "back_home_button"
                widget: "string"
