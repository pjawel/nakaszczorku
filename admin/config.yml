backend:
  name: github
  repo: pjawel/nakaszczorku # Your GitHub username and repository
  branch: main             # Change to 'master' if your repo's main branch is master
  
  # Cloudflare Worker OAuth Proxy Base URL (without the trailing /callback)
  base_url: https://young-frog-f195.pjawel5.workers.dev
  auth_endpoint: auth

# Enable local testing proxy when running 'npx decap-server' locally
local_backend: true

# Media paths
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # General page metadata
  - name: "pages"
    label: "Strony"
    files:
      - file: "src/data/site_info.json"
        label: "Informacje o stronie"
        name: "site_info"
        fields:
          - { label: "Nazwa", name: "name", widget: "string" }
          - { label: "Opis", name: "description", widget: "text" }

  # Menu / Pierogi collection
  - name: "menu"
    label: "Menu (Pierogi)"
    folder: "src/content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nazwa dania", name: "title", widget: "string" }
      - { label: "Cena (PLN)", name: "price", widget: "number", value_type: "float" }
      - { label: "Opis", name: "description", widget: "text" }
      - { label: "Zdjęcie", name: "image", widget: "image", required: false }
