  empty_message: Brak dostępnych stron menu.
story:
  eyebrow: Nasza Historia
  title: Więcej niż kulinaria. To nasze życie.
  paragraph1: „Dla nas każda lepiona sztuka to osobna historia. Nie uznajemy
    skrótów, dlatego składniki wybieramy tak, jakbyśmy robili je dla własnej
    rodziny.”
  paragraph2: Kaszczorek to miejsce, gdzie czas płynie wolniej. Nasza pierogarnia
    oddaje ten klimat – jest swojsko, smacznie i zawsze z uśmiechem.
cta_section:
  title: Zgłodniałeś?
  description: Zamów nasze domowe przysmaki bezpośrednio do swojego domu. Świeże,
    gorące i lepione z pasją.
  button_label: Przejdź do zamawiania
gallery_section:
  eyebrow: Uchwycone chwile
  title: Galeria
  description: Zajrzyj do naszej kuchni i poczuj atmosferę miejsca, w którym
    tradycja łączy się z pasją do domowego gotowania.
reviews:
  eyebrow: Zadowoleni Goście
  title: Co o nas mówią
  quote: Najlepsze pierogi jakie jadłem w Toruniu! Czuć, że są robione z sercem i
    tradycją. Kaszczorek ma swój kulinarny skarb, do którego wracamy całą
    rodziną.
  facebook_button_label: Opinie na Facebooku
