  subtitle: Witamy w Pierogarni
  title_line1: "Domowa tradycja "
  title_line2: lepiona ręcznie.
  bg_image: https://1s4oyld5dc.ucarecd.net/5cef6b74-fab3-488f-b9a1-578a54abe22c/
story:
  title: Więcej niż kulinaria. To nasze życie.
  subtitle: " Nasza Historia"
  paragraph1: „Dla nas każda lepiona sztuka to osobna historia. Nie uznajemy
    skrótów, dlatego składniki wybieramy tak, jakbyśmy robili je dla własnej
    rodziny.”
  paragraph2: Kaszczorek to miejsce, gdzie czas płynie wolniej. Nasza pierogarnia
    oddaje ten klimat – jest swojsko, smacznie i zawsze z uśmiechem.
  main_image: https://1s4oyld5dc.ucarecd.net/dd7ac215-05a1-4272-989f-712536f1658c/
review:
  quote: '"Najlepsze pierogi jakie jadłem w Toruniu! Czuć, że są robione z sercem
    i tradycją. Kaszczorek ma swój kulinarny skarb, do którego wracamy całą
    rodziną."'
