# GitHub repository configuration
backend:
  name: github
  repo: pjawel/nakaszczorku # Your GitHub username/repo
  branch: main # Change to 'master' if your repo default branch is master
  
  # OAuth Authentication Gateway URL (Required for GitHub Pages)
  # Replace with your deployed OAuth proxy URL (e.g. Snet, Vercel Decap OAuth, or Cloudflare Worker)
  # base_url: https://your-oauth-proxy.vercel.app

# Enable local proxy server during local development (npx decap-server)
local_backend: true

# Media upload paths
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # Collection for general site metadata
  - name: "pages"
    label: "Strony"
    files:
      - file: "src/data/site_info.json"
        label: "Informacje o stronie"
        name: "site_info"
        fields:
          - { label: "Nazwa", name: "name", widget: "string" }
          - { label: "Opis", name: "description", widget: "text" }

  # Collection for Menu / Pierogi
  - name: "menu"
    label: "Menu (Pierogi)"
    folder: "src/content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nazwa dania", name: "title", widget: "string" }
      - { label: "Cena (PLN)", name: "price", widget: "number", value_type: "float" }
      - { label: "Opis", name: "description", widget: "text" }
      - { label: "Zdjęcie", name: "image", widget: "image", required: false }
