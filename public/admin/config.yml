# ==========================================
# KONFIGURACJA DECAP CMS (NETLIFY CMS)
# ==========================================

backend:
  name: github
  repo: pjawel/nakaszczorku # <-- Zmień na własne repozytorium
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

media_library:
  name: uploadcare
  config:
    publicKey: demopublickey

collections:
  - name: "settings"
    label: "Ustawienia strony"
    files:
      - file: "src/data/config.yml"
        label: "Zawartość i Menu Pierogarni"
        name: "site_config"
        fields:
          - label: "URL Webhooka (Make.com)"
            name: "webhookUrl"
            widget: "string"

          - label: "Informacje kontaktowe"
            name: "info"
            widget: "object"
            fields:
              - label: "Nazwa restauracji"
                name: "title"
                widget: "string"
              - label: "Telefon"
                name: "phone"
                widget: "string"
              - label: "Adres"
                name: "address"
                widget: "object"
                fields:
                  - label: "Ulica"
                    name: "street"
                    widget: "string"
                  - label: "Miasto"
                    name: "city"
                    widget: "string"
              - label: "Godziny otwarcia"
                name: "hours"
                widget: "string"
              - label: "Link do Facebooka"
                name: "facebookUrl"
                widget: "string"
              - label: "Link do opinii FB"
                name: "facebookReviewsUrl"
                widget: "string"
              - label: "Link Embed Mapy Google"
                name: "googleMapsEmbedUrl"
                widget: "text"

          - label: "Sekcja Hero (Nagłówek)"
            name: "hero"
            widget: "object"
            fields:
              - label: "Podtytuł"
                name: "subtitle"
                widget: "string"
              - label: "Tytuł - linia 1"
                name: "title_line1"
                widget: "string"
              - label: "Tytuł - linia 2"
                name: "title_line2"
                widget: "string"
              - label: "Tło (Zdjęcie)"
                name: "bg_image"
                widget: "image"

          - label: "Sekcja O Nas (Historia)"
            name: "story"
            widget: "object"
            fields:
              - label: "Podtytuł"
                name: "subtitle"
                widget: "string"
              - label: "Tytuł"
                name: "title"
                widget: "text"
              - label: "Akapit 1"
                name: "paragraph1"
                widget: "text"
              - label: "Akapit 2"
                name: "paragraph2"
                widget: "text"
              - label: "Główne zdjęcie"
                name: "main_image"
                widget: "image"
              - label: "Mniejsze zdjęcia"
                name: "sub_images"
                widget: "list"
                field:
                  label: "Zdjęcie"
                  name: "image"
                  widget: "image"

          - label: "Cytat / Opinia"
            name: "review"
            widget: "object"
            fields:
              - label: "Treść opinii"
                name: "quote"
                widget: "text"

          - label: "Skany Papierowego Menu (Książka 3D)"
            name: "menu_images"
            widget: "list"
            field:
              label: "Skan"
              name: "image"
              widget: "image"

          - label: "Galeria Zdjęć"
            name: "gallery_images"
            widget: "list"
            field:
              label: "Zdjęcie"
              name: "image"
              widget: "image"

          - label: "Menu do Zamówień"
            name: "order_menu"
            widget: "list"
            fields:
              - label: "Nazwa kategorii"
                name: "category"
                widget: "string"
              - label: "Opis kategorii (opcjonalny)"
                name: "description"
                widget: "string"
                required: false
              - label: "Dania"
                name: "items"
                widget: "list"
                fields:
                  - label: "ID dania (unikalne, np. pierogi-ruskie)"
                    name: "id"
                    widget: "string"
                  - label: "Nazwa dania"
                    name: "name"
                    widget: "string"
                  - label: "Cena (zł)"
                    name: "price"
                    widget: "number"
                    value_type: "int"
