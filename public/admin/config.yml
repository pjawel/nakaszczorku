backend:
  name: github
  repo: pjawel/nakaszczorku # Configured based on your package.json homepage
  branch: main # Adjust to 'master' if that is your main branch

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # Example collection for Website Information / Pages
  - name: "pages"
    label: "Strony"
    files:
      - file: "src/data/site_info.json"
        label: "Informacje o stronie"
        name: "site_info"
        fields:
          - { label: "Nazwa", name: "name", widget: "string" }
          - { label: "Opis", name: "description", widget: "text" }

  # Example collection for Menu Items (Pierogi)
  - name: "menu"
    label: "Menu (Pierogi)"
    folder: "src/content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nazwa dania", name: "title", widget: "string" }
      - { label: "Cena (PLN)", name: "price", widget: "number", value_type: "float" }
      - { label: "Opis", name: "description", widget: "text" }
      - { label: "Zdjęcie", name: "image", widget: "image", required: false }
