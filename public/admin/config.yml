# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: pjawel/nakaszczorku
  branch: main
  identity_url: https://auth.decapbridge.com/sites/92bf7f64-262e-47b1-8c80-7c3c32dc8b8e
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://pierogarniawkaszczorku.pl

# -------------------------------------------------------------
# REQUIRED MISSING PROPERTIES (This solves your error):
# -------------------------------------------------------------

# Where uploaded images will be saved in your GitHub repository
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Define the collections/pages your client can edit
collections:
  - name: "pages"
    label: "Strony"
    files:
      - file: "src/data/site_info.json"
        label: "Informacje o stronie"
        name: "site_info"
        fields:
          - { label: "Nazwa", name: "name", widget: "string" }
          - { label: "Opis", name: "description", widget: "text" }

  - name: "menu"
    label: "Menu (Pierogi)"
    folder: "src/content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nazwa dania", name: "title", widget: "string" }
      - { label: "Cena (PLN)", name: "price", widget: "number", value_type: "float" }
      - { label: "Opis", name: "description", widget: "text" }
      - { label: "Zdjęcie", name: "image", widget: "image", required: false }
